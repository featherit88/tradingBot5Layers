# Ruff linter configuration for trading bot
target-version = "py312"
line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (unused imports, undefined names, etc.)
    "B",      # flake8-bugbear (common bugs & design problems)
    "SIM",    # flake8-simplify (simplifiable code)
    "UP",     # pyupgrade (outdated Python syntax)
    "I",      # isort (import ordering)
    "DTZ",    # flake8-datetimez (enforce timezone-aware datetimes)
    "T20",    # flake8-print (no print statements — use logging)
    "RET",    # flake8-return (unnecessary return statements)
    "PIE",    # flake8-pie (misc lints)
    "PT",     # flake8-pytest-style (pytest best practices)
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (we use line-length=120 instead)
    "B008",   # function call in default argument (common in dataclasses)
    "RET504", # unnecessary variable before return (readability preference)
    "PT011",  # pytest.raises too broad (we'll add match= gradually)
]

[lint.per-file-ignores]
"tests/*" = ["T20"]  # allow print in tests
"run_backtest.py" = ["T20"]  # CLI script uses print for output
"broker/exchange_token.py" = ["T20"]  # CLI script uses print for output
"__init__.py" = ["F401"]  # unused imports OK in __init__ (re-exports)

[lint.isort]
known-first-party = ["config", "indicators", "filters", "scoring", "strategies", "risk", "broker", "bot", "backtest"]
